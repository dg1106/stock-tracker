<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스트라드비젼 주가</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e8eaed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }
    header { width: 100%; max-width: 560px; margin-bottom: 20px; }
    header h1 { font-size: 1.1rem; font-weight: 600; color: #9aa0a6; }
    header p.sub { font-size: 0.78rem; color: #5f6368; margin-top: 4px; }

    .card {
      background: #1e2029;
      border-radius: 16px;
      padding: 20px;
      width: 100%;
      max-width: 560px;
      margin-bottom: 14px;
    }

    .card-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: #5f6368;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
    }

    /* 현재가 */
    .price-main { font-size: 2.6rem; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; }
    .price-change { display: flex; align-items: center; gap: 8px; margin-top: 6px; font-size: 1rem; font-weight: 500; }
    .up   { color: #ea4335; }
    .down { color: #34a853; }
    .flat { color: #9aa0a6; }

    .label { font-size: 0.72rem; color: #5f6368; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }

    /* 호가 */
    .orderbook { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .ob-cell { background: #272930; border-radius: 10px; padding: 14px 16px; }
    .ob-price { font-size: 1.2rem; font-weight: 600; }
    .ob-cell.ask .ob-price { color: #ea4335; }
    .ob-cell.bid .ob-price { color: #34a853; }

    .divider { height: 1px; background: #2d3140; margin: 16px 0; }

    .info-row {
      display: flex; justify-content: space-between;
      font-size: 0.88rem; color: #9aa0a6; padding: 4px 0;
    }
    .info-row span:last-child { color: #e8eaed; font-weight: 500; }

    /* 오늘 현황 그리드 */
    .today-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .today-cell { background: #272930; border-radius: 10px; padding: 12px 14px; }
    .today-val { font-size: 1.05rem; font-weight: 600; margin-top: 4px; }
    .today-cell.high .today-val { color: #ea4335; }
    .today-cell.low  .today-val { color: #34a853; }

    /* 52주 바 */
    .range-bar-wrap { margin-top: 14px; }
    .range-labels { display: flex; justify-content: space-between; font-size: 0.78rem; color: #5f6368; margin-bottom: 6px; }
    .range-track {
      position: relative;
      height: 6px;
      background: #2d3140;
      border-radius: 3px;
    }
    .range-fill {
      position: absolute;
      left: 0; top: 0; height: 100%;
      background: linear-gradient(90deg, #34a853, #fbbc04, #ea4335);
      border-radius: 3px;
    }
    .range-dot {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 12px; height: 12px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 0 2px #4285f4;
    }
    .range-current { text-align: center; font-size: 0.78rem; color: #4285f4; margin-top: 6px; }

    /* 시총 + IPO */
    .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .meta-cell { background: #272930; border-radius: 10px; padding: 12px 14px; }
    .meta-val { font-size: 1rem; font-weight: 600; margin-top: 4px; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-top: 4px;
    }
    .badge.yellow { background: rgba(251,188,4,0.15); color: #fbbc04; }
    .badge.blue   { background: rgba(66,133,244,0.15); color: #4285f4; }
    .badge.green  { background: rgba(52,168,83,0.15);  color: #34a853; }
    .badge.red    { background: rgba(234,67,53,0.15);   color: #ea4335; }
    .badge.gray   { background: rgba(154,160,166,0.15); color: #9aa0a6; }

    /* 최근 체결 */
    .trade-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      font-size: 0.85rem;
      padding: 8px 0;
      border-bottom: 1px solid #2d3140;
      color: #9aa0a6;
    }
    .trade-row:last-child { border-bottom: none; }
    .trade-row .t-price { color: #e8eaed; font-weight: 600; text-align: center; }
    .trade-row .t-qty   { text-align: right; }

    /* 차트 */
    .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .chart-title { font-size: 0.85rem; font-weight: 600; color: #9aa0a6; }
    .period-tabs { display: flex; gap: 4px; }
    .period-btn {
      background: none; border: none; color: #5f6368;
      font-size: 0.78rem; font-weight: 600;
      padding: 4px 10px; border-radius: 6px; cursor: pointer; transition: all 0.15s;
    }
    .period-btn:hover { color: #e8eaed; }
    .period-btn.active { background: #2d3140; color: #e8eaed; }
    .chart-wrap { position: relative; height: 200px; }

    /* IPO 타임라인 */
    .timeline-item { display:flex; align-items:flex-start; gap:12px; padding:8px 0; position:relative; }
    .timeline-item:not(:last-child)::after { content:""; position:absolute; left:7px; top:22px; bottom:-8px; width:2px; background:#2d3140; }
    .tl-dot { flex-shrink:0; width:16px; height:16px; border-radius:50%; margin-top:2px; border:2px solid #2d3140; background:#1e2029; }
    .tl-dot.done    { background:#34a853; border-color:#34a853; }
    .tl-dot.current { background:#fbbc04; border-color:#fbbc04; box-shadow:0 0 6px rgba(251,188,4,0.5); animation:pulse 2s infinite; }
    .tl-label { font-size:0.88rem; color:#9aa0a6; }
    .tl-label.current { color:#fbbc04; font-weight:600; }
    .tl-label.done    { color:#e8eaed; }
    .tl-date  { font-size:0.75rem; color:#5f6368; margin-top:2px; }

    /* 매수/매도 압력 바 */
    .pressure-bar { height:8px; background:#ea4335; border-radius:4px; overflow:hidden; margin:8px 0 4px; }
    .pressure-buy { height:100%; background:#34a853; border-radius:4px; transition:width 0.4s; }
    .pressure-labels { display:flex; justify-content:space-between; font-size:0.78rem; font-weight:600; }

    /* 재무 수평 바 차트 */
    .fin-chart-wrap { position: relative; height: 132px; margin-top: 6px; }
    .fin-margins { font-size: 0.78rem; color: #5f6368; margin-top: 10px; line-height: 1.45; }
    .fin-fallback { font-size: 0.85rem; color: #5f6368; padding: 8px 0; }

    /* 상태 바 */
    .status-bar {
      width: 100%; max-width: 560px;
      display: flex; justify-content: space-between;
      font-size: 0.75rem; color: #5f6368; padding: 0 4px;
    }
    .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #34a853; margin-right: 5px; animation: pulse 2s infinite; }
    .dot.error { background: #ea4335; animation: none; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  </style>
</head>
<body>

<header>
  <h1>스트라드비젼 <span style="color:#5f6368;font-weight:400">475040</span></h1>
  <p class="sub">비상장 주식 · 증권플러스</p>
</header>

<!-- 현재가 -->
<div class="card">
  <div class="label">현재가</div>
  <div class="price-main" id="current-price">—</div>
  <div class="price-change">
    <span id="change-price">—</span>
    <span id="change-rate">—</span>
  </div>
  <div class="divider"></div>
  <div class="orderbook">
    <div class="ob-cell ask">
      <div class="label">매도 최저가</div>
      <div class="ob-price" id="ask-price">—</div>
    </div>
    <div class="ob-cell bid">
      <div class="label">매수 최고가</div>
      <div class="ob-price" id="bid-price">—</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="info-row"><span>전일 종가</span><span id="prev-price">—</span></div>
</div>

<!-- 오늘 현황 -->
<div class="card">
  <div class="card-title">오늘 현황</div>
  <div class="today-grid">
    <div class="today-cell high">
      <div class="label">고가</div>
      <div class="today-val" id="today-high">—</div>
    </div>
    <div class="today-cell low">
      <div class="label">저가</div>
      <div class="today-val" id="today-low">—</div>
    </div>
    <div class="today-cell">
      <div class="label">거래량</div>
      <div class="today-val" id="today-volume">—</div>
    </div>
    <div class="today-cell">
      <div class="label">매수 / 매도주문</div>
      <div class="today-val" id="today-stats">—</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="label" style="margin-bottom:4px">매수/매도 주문 비율</div>
  <div class="pressure-bar"><div class="pressure-buy" id="pressure-buy" style="width:50%"></div></div>
  <div class="pressure-labels">
    <span id="pressure-buy-pct" style="color:#34a853">—</span>
    <span id="pressure-sell-pct" style="color:#ea4335">—</span>
  </div>
  <div id="order-sources" style="margin-top:8px;font-size:0.75rem;color:#5f6368;display:none"></div>
</div>

<!-- 52주 범위 -->
<div class="card">
  <div class="card-title">52주 가격 범위</div>
  <div class="range-bar-wrap">
    <div class="range-labels">
      <span id="low-52w">—</span>
      <span id="high-52w">—</span>
    </div>
    <div class="range-track">
      <div class="range-fill" id="range-fill" style="width:0%"></div>
      <div class="range-dot" id="range-dot" style="left:0%"></div>
    </div>
    <div class="range-current" id="range-pct">현재가 위치 —</div>
  </div>
</div>

<!-- 시가총액 + IPO -->
<div class="card">
  <div class="card-title">기업 정보</div>
  <div class="meta-grid">
    <div class="meta-cell">
      <div class="label">시가총액</div>
      <div class="meta-val" id="market-cap">—</div>
    </div>
    <div class="meta-cell">
      <div class="label">IPO 상태</div>
      <div id="ipo-badge">—</div>
    </div>
  </div>
</div>

<!-- IPO 재무 지표 -->
<div class="card">
  <div class="card-title">재무 지표 (최근 결산 기준)</div>
  <div class="info-row"><span>공모 주식 수</span><span id="ipo-shares">—</span></div>
  <div class="info-row"><span>상장 주식 수</span><span id="listed-shares">—</span></div>
  <div class="divider"></div>
  <div id="fin-chart-block">
    <div class="fin-chart-wrap"><canvas id="finChart"></canvas></div>
    <div id="fin-margins" class="fin-margins"></div>
    <div id="fin-fallback" class="fin-fallback" style="display:none"></div>
  </div>
  <div class="divider"></div>
  <div class="info-row"><span>3개월 전 가격</span><span id="three-month-ago">—</span></div>
  <div class="info-row"><span>월평균 일거래량</span><span id="monthly-avg-vol">—</span></div>
  <div class="info-row"><span>매도 가능 주식</span><span id="sell-stock-count">—</span></div>
</div>

<!-- IPO 진행 일정 -->
<div class="card">
  <div class="card-title">IPO 진행 일정</div>
  <div id="ipo-timeline"></div>
</div>

<!-- 최근 체결 내역 -->
<div class="card">
  <div class="card-title">최근 체결 내역</div>
  <div class="trade-row" style="color:#5f6368;font-size:0.75rem;padding-bottom:8px;">
    <span>시각</span><span style="text-align:center">가격</span><span style="text-align:right">수량</span>
  </div>
  <div id="recent-trades"></div>
</div>

<!-- 가격 추이 차트 -->
<div class="card">
  <div class="chart-header">
    <div class="chart-title">가격 추이</div>
    <div class="period-tabs">
      <button class="period-btn active" data-period="1m">1개월</button>
      <button class="period-btn" data-period="3m">3개월</button>
      <button class="period-btn" data-period="1y">1년</button>
      <button class="period-btn" data-period="3y">3년</button>
      <button class="period-btn" data-period="all">전체</button>
    </div>
  </div>
  <div class="chart-wrap">
    <canvas id="priceChart"></canvas>
  </div>
</div>

<div class="status-bar">
  <div><span class="dot" id="status-dot"></span><span id="status-text">데이터 로딩 중...</span></div>
  <div><span id="countdown">60</span>초 후 갱신</div>
</div>

<script>
  const fmt    = n => n != null ? Number(n).toLocaleString("ko-KR") + "원" : "—";
  const fmtNum = n => n != null ? Number(n).toLocaleString("ko-KR") : "—";
  const fmtRate   = r => r != null ? (r > 0 ? "+" : "") + Number(r).toFixed(2) + "%" : "—";
  const fmtChange = c => c != null ? (c > 0 ? "+" : "") + Number(c).toLocaleString("ko-KR") + "원" : "—";
  const fmtWon = n => {
    if (n == null) return "—";
    const s = n < 0 ? "-" : "", a = Math.abs(n);
    if (a >= 1e12) return s + (a / 1e12).toFixed(1) + "조";
    if (a >= 1e8)  return s + Math.round(a / 1e8) + "억";
    return s + Number(a).toLocaleString("ko-KR");
  };
  const fmtCap = n => {
    if (n == null) return "—";
    if (n >= 1e12) return (n / 1e12).toFixed(1) + "조";
    if (n >= 1e8)  return Math.round(n / 1e8) + "억";
    return Number(n).toLocaleString("ko-KR");
  };

  function setClass(el, val) {
    el.classList.remove("up", "down", "flat");
    el.classList.add(val > 0 ? "up" : val < 0 ? "down" : "flat");
  }

  // Chart.js
  let chartInstance = null;
  let finChartInstance = null;
  let allCharts = {};
  let activePeriod = "1m";
  const ctx = document.getElementById("priceChart").getContext("2d");
  const finCanvas = document.getElementById("finChart");

  function renderChart(period) {
    const points = allCharts[period] || [];
    const labels = points.map(p => p.date);
    const values = points.map(p => p.price);
    const isUp = values.length > 1 && values[values.length - 1] >= values[0];
    const lineColor = isUp ? "#ea4335" : "#34a853";
    const fillColor = isUp ? "rgba(234,67,53,0.12)" : "rgba(52,168,83,0.12)";
    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
      type: "line",
      data: { labels, datasets: [{ data: values, borderColor: lineColor, backgroundColor: fillColor, borderWidth: 2, pointRadius: 0, fill: true, tension: 0.3 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { mode: "index", intersect: false, callbacks: { label: c => Number(c.parsed.y).toLocaleString("ko-KR") + "원" } }
        },
        scales: {
          x: { grid: { color: "#2d3140" }, ticks: { color: "#5f6368", font: { size: 10 }, maxTicksLimit: 6, maxRotation: 0 } },
          y: { position: "right", grid: { color: "#2d3140" }, ticks: { color: "#5f6368", font: { size: 10 }, callback: v => Number(v).toLocaleString("ko-KR") } }
        },
        interaction: { mode: "nearest", axis: "x", intersect: false }
      }
    });
  }

  function renderFinancials(d) {
    const wrap = document.querySelector("#fin-chart-block .fin-chart-wrap");
    const fb = document.getElementById("fin-fallback");
    const marginEl = document.getElementById("fin-margins");
    const sales = d.total_sales;
    const op = d.operating_profit;
    const np = d.net_profit;
    const vals = [sales, op, np];
    if (vals.every(v => v == null)) {
      if (wrap) wrap.style.display = "none";
      if (fb) { fb.style.display = "block"; fb.textContent = "재무 데이터 없음"; }
      if (marginEl) marginEl.textContent = "";
      if (finChartInstance) { finChartInstance.destroy(); finChartInstance = null; }
      return;
    }
    if (wrap) wrap.style.display = "";
    if (fb) fb.style.display = "none";

    const finLabels = ["\uB9E4\uCD9C\uC561", "\uC601\uC5C5\uC774\uC775", "\uB2F9\uAE30\uC21C\uC774\uC775"];
    const data = [sales ?? null, op ?? null, np ?? null];
    const colors = [
      "#4285f4",
      op == null ? "#5f6368" : (op >= 0 ? "#34a853" : "#ea4335"),
      np == null ? "#5f6368" : (np >= 0 ? "#34a853" : "#ea4335"),
    ];
    const nums = vals.filter(v => v != null).map(Number);
    let minX = Math.min(0, ...nums);
    let maxX = Math.max(0, ...nums);
    if (minX === maxX) {
      const pad = Math.abs(minX) * 0.1 || 1e6;
      minX -= pad;
      maxX += pad;
    } else {
      const span = maxX - minX;
      minX -= span * 0.06;
      maxX += span * 0.06;
    }

    const fctx = finCanvas.getContext("2d");
    if (finChartInstance) finChartInstance.destroy();
    finChartInstance = new Chart(fctx, {
      type: "bar",
      data: {
        labels: finLabels,
        datasets: [{
          data,
          backgroundColor: colors,
          borderWidth: 0,
          borderRadius: 4,
          barThickness: 18,
        }]
      },
      options: {
        indexAxis: "y",
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: (c) => {
                const v = c.raw;
                if (v == null) return "—";
                return fmtWon(v);
              }
            }
          }
        },
        scales: {
          x: {
            grid: { color: "#2d3140" },
            ticks: {
              color: "#5f6368",
              font: { size: 10 },
              callback: (v) => {
                const a = Math.abs(v);
                if (a >= 1e12) return (v < 0 ? "-" : "") + (Math.abs(v) / 1e12).toFixed(1) + "조";
                if (a >= 1e8) return (v < 0 ? "-" : "") + Math.round(Math.abs(v) / 1e8) + "\uC5B5";
                return Number(v).toLocaleString("ko-KR");
              }
            },
            min: minX,
            max: maxX,
          },
          y: {
            grid: { display: false },
            ticks: { color: "#9aa0a6", font: { size: 11 } }
          }
        }
      }
    });

    const sNum = sales != null ? Number(sales) : null;
    if (marginEl) {
      if (sNum != null && Math.abs(sNum) > 0) {
        const parts = [];
        if (op != null) parts.push("\uC601\uC5C5\uC774\uC775\uC728: " + (Number(op) / sNum * 100).toFixed(1) + "%");
        if (np != null) parts.push("\uC21C\uC774\uC775\uC728: " + (Number(np) / sNum * 100).toFixed(1) + "%");
        marginEl.textContent = parts.join("   ");
      } else {
        marginEl.textContent = (op != null || np != null)
          ? "매출액이 없어 매출 대비 이익률은 표시하지 않습니다."
          : "";
      }
    }
  }

  function renderTimeline(schedules, currentState) {
    const el = document.getElementById("ipo-timeline");
    if (!schedules || !schedules.length) { el.innerHTML = "<p style='color:#5f6368;font-size:0.85rem'>일정 정보 없음</p>"; return; }
    const currentIdx = schedules.findIndex(s => s.state === currentState);
    el.innerHTML = schedules.map((s, i) => {
      const status = i < currentIdx ? "done" : i === currentIdx ? "current" : "pending";
      return `<div class="timeline-item">
        <div class="tl-dot ${status}"></div>
        <div>
          <div class="tl-label ${status}">${s.label}</div>
          <div class="tl-date">${s.date ? s.date.replace(/-/g, ".") : "—"}</div>
        </div>
      </div>`;
    }).join("");
  }

  document.querySelectorAll(".period-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".period-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      activePeriod = btn.dataset.period;
      renderChart(activePeriod);
    });
  });

  async function fetchPrice() {
    try {
      const res = await fetch("/api/price");
      const d = await res.json();
      if (!d.success) {
        document.getElementById("status-text").textContent = d.error || "오류 발생";
        document.getElementById("status-dot").className = "dot error";
        return;
      }

      // 현재가 카드
      document.getElementById("current-price").textContent = fmt(d.current_price);
      document.getElementById("prev-price").textContent = fmt(d.prev_price);
      document.getElementById("ask-price").textContent = fmt(d.ask_price);
      document.getElementById("bid-price").textContent = fmt(d.bid_price);
      const cp = document.getElementById("change-price");
      const cr = document.getElementById("change-rate");
      cp.textContent = fmtChange(d.change_price);
      cr.textContent = fmtRate(d.change_rate);
      setClass(cp, d.change_price); setClass(cr, d.change_rate);

      // 오늘 현황
      document.getElementById("today-high").textContent = fmt(d.today_high);
      document.getElementById("today-low").textContent = fmt(d.today_low);
      document.getElementById("today-volume").textContent = fmtNum(d.today_volume) + "주";
      document.getElementById("today-stats").textContent =
        `${fmtNum(d.order_buy_today)} / ${fmtNum(d.order_sell_today)}`;
      const buy = d.order_buy_today || 0, sell = d.order_sell_today || 0, total = buy + sell;
      if (total > 0) {
        const pct = Math.round(buy / total * 100);
        document.getElementById("pressure-buy").style.width = pct + "%";
        document.getElementById("pressure-buy-pct").textContent = "매수 " + pct + "%";
        document.getElementById("pressure-sell-pct").textContent = "매도 " + (100 - pct) + "%";
      }
      const srcEl = document.getElementById("order-sources");
      if (d.order_sources && Object.keys(d.order_sources).length > 1) {
        srcEl.style.display = "block";
        srcEl.innerHTML = Object.values(d.order_sources)
          .map(s => `<span style="margin-right:12px">${s.label} <span style="color:#34a853">${fmtNum(s.buy)}</span> / <span style="color:#ea4335">${fmtNum(s.sell)}</span></span>`)
          .join("");
      } else {
        srcEl.style.display = "none";
      }

      // 52주 범위 바
      const lo = d.low_52w, hi = d.high_52w, cur = d.current_price;
      document.getElementById("low-52w").textContent = fmt(lo);
      document.getElementById("high-52w").textContent = fmt(hi);
      if (lo != null && hi != null && cur != null && hi > lo) {
        const pct = Math.min(100, Math.max(0, (cur - lo) / (hi - lo) * 100));
        document.getElementById("range-fill").style.width = pct + "%";
        document.getElementById("range-dot").style.left = pct + "%";
        document.getElementById("range-pct").textContent =
          `현재가는 52주 범위의 ${pct.toFixed(0)}% 위치`;
      }

      // 시총 + IPO
      document.getElementById("market-cap").textContent = fmtCap(d.market_cap);
      const badgeEl = document.getElementById("ipo-badge");
      const badgeClass =
        ["심사중", "심사신청", "주관사선정", "기술평가통과"].includes(d.ipo_status) ? "yellow" :
        ["심사승인", "증권신고서제출", "수요예측", "청약", "상장예정", "배정일", "환불일"].includes(d.ipo_status) ? "blue" :
        d.ipo_status === "상장완료" ? "green" :
        d.ipo_status === "철회" ? "red" : "gray";
      badgeEl.innerHTML = `<span class="badge ${badgeClass}">${d.ipo_status || "해당없음"}</span>`;

      // IPO 재무 지표
      document.getElementById("ipo-shares").textContent = fmtNum(d.ipo_shares) + "주";
      document.getElementById("listed-shares").textContent = fmtNum(d.listed_shares) + "주";
      renderFinancials(d);
      document.getElementById("monthly-avg-vol").textContent = fmtNum(d.monthly_avg_volume) + "주";
      document.getElementById("sell-stock-count").textContent = fmtNum(d.sell_stock_count) + "주";
      if (d.three_month_ago_price && d.current_price) {
        const chg = ((d.current_price - d.three_month_ago_price) / d.three_month_ago_price * 100).toFixed(1);
        document.getElementById("three-month-ago").innerHTML =
          `${fmt(d.three_month_ago_price)} <span class="${chg >= 0 ? 'up' : 'down'}" style="font-size:0.8rem">(${chg >= 0 ? "+" : ""}${chg}%)</span>`;
      }

      // IPO 진행 일정
      renderTimeline(d.ipo_schedules, d.ipo_current_state);

      // 최근 체결 내역
      const tradesEl = document.getElementById("recent-trades");
      tradesEl.innerHTML = (d.recent_trades || []).map(t =>
        `<div class="trade-row">
          <span>${t.time}</span>
          <span class="t-price">${fmt(t.price)}</span>
          <span class="t-qty">${fmtNum(t.quantity)}주</span>
        </div>`
      ).join("");

      // 차트
      if (d.charts) { allCharts = d.charts; renderChart(activePeriod); }

      const updatedAt = d.updated_at ? new Date(d.updated_at).toLocaleTimeString("ko-KR") : "—";
      document.getElementById("status-text").textContent = updatedAt + " 기준";
      document.getElementById("status-dot").className = "dot";
    } catch (e) {
      document.getElementById("status-text").textContent = "연결 오류";
      document.getElementById("status-dot").className = "dot error";
    }
  }

  let secondsLeft = 60;
  function tick() {
    document.getElementById("countdown").textContent = secondsLeft;
    if (secondsLeft <= 0) { secondsLeft = 60; fetchPrice(); }
    secondsLeft--;
  }
  fetchPrice();
  setInterval(tick, 1000);
</script>
</body>
</html>
