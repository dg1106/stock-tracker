<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스트라드비젼 주가</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e8eaed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    header {
      width: 100%;
      max-width: 560px;
      margin-bottom: 20px;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #9aa0a6;
    }

    header p.sub {
      font-size: 0.78rem;
      color: #5f6368;
      margin-top: 4px;
    }

    .card {
      background: #1e2029;
      border-radius: 16px;
      padding: 20px;
      width: 100%;
      max-width: 560px;
      margin-bottom: 14px;
    }

    .price-main {
      font-size: 2.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .price-change {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      font-size: 1rem;
      font-weight: 500;
    }

    .up   { color: #ea4335; }
    .down { color: #34a853; }
    .flat { color: #9aa0a6; }

    .label {
      font-size: 0.72rem;
      color: #5f6368;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .orderbook {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .ob-cell {
      background: #272930;
      border-radius: 10px;
      padding: 14px 16px;
    }

    .ob-price {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .ob-cell.ask .ob-price { color: #ea4335; }
    .ob-cell.bid .ob-price { color: #34a853; }

    .divider {
      height: 1px;
      background: #2d3140;
      margin: 16px 0;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.88rem;
      color: #9aa0a6;
      padding: 4px 0;
    }

    .info-row span:last-child {
      color: #e8eaed;
      font-weight: 500;
    }

    /* 차트 카드 */
    .chart-card {
      background: #1e2029;
      border-radius: 16px;
      padding: 20px;
      width: 100%;
      max-width: 560px;
      margin-bottom: 14px;
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .chart-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #9aa0a6;
    }

    .period-tabs {
      display: flex;
      gap: 4px;
    }

    .period-btn {
      background: none;
      border: none;
      color: #5f6368;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .period-btn:hover { color: #e8eaed; }
    .period-btn.active {
      background: #2d3140;
      color: #e8eaed;
    }

    .chart-wrap {
      position: relative;
      height: 200px;
    }

    /* 상태 바 */
    .status-bar {
      width: 100%;
      max-width: 560px;
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #5f6368;
      padding: 0 4px;
    }

    .dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #34a853;
      margin-right: 5px;
      animation: pulse 2s infinite;
    }
    .dot.error { background: #ea4335; animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>

<header>
  <h1>스트라드비젼 <span style="color:#5f6368;font-weight:400">475040</span></h1>
  <p class="sub">비상장 주식 · 증권플러스</p>
</header>

<!-- 가격 카드 -->
<div class="card">
  <div class="label">현재가</div>
  <div class="price-main" id="current-price">—</div>
  <div class="price-change">
    <span id="change-price">—</span>
    <span id="change-rate">—</span>
  </div>

  <div class="divider"></div>

  <div class="orderbook">
    <div class="ob-cell ask">
      <div class="label">매도 최저가</div>
      <div class="ob-price" id="ask-price">—</div>
    </div>
    <div class="ob-cell bid">
      <div class="label">매수 최고가</div>
      <div class="ob-price" id="bid-price">—</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="info-row">
    <span>전일 종가</span>
    <span id="prev-price">—</span>
  </div>
</div>

<!-- 차트 카드 -->
<div class="chart-card">
  <div class="chart-header">
    <div class="chart-title">가격 추이</div>
    <div class="period-tabs">
      <button class="period-btn active" data-period="1m">1개월</button>
      <button class="period-btn" data-period="3m">3개월</button>
      <button class="period-btn" data-period="1y">1년</button>
      <button class="period-btn" data-period="3y">3년</button>
      <button class="period-btn" data-period="all">전체</button>
    </div>
  </div>
  <div class="chart-wrap">
    <canvas id="priceChart"></canvas>
  </div>
</div>

<!-- 상태 바 -->
<div class="status-bar">
  <div><span class="dot" id="status-dot"></span><span id="status-text">데이터 로딩 중...</span></div>
  <div><span id="countdown">60</span>초 후 갱신</div>
</div>

<script>
  const fmt = n => n != null ? Number(n).toLocaleString("ko-KR") + "원" : "—";
  const fmtRate = r => r != null ? (r > 0 ? "+" : "") + Number(r).toFixed(2) + "%" : "—";
  const fmtChange = c => c != null ? (c > 0 ? "+" : "") + Number(c).toLocaleString("ko-KR") + "원" : "—";

  function setClass(el, val) {
    el.classList.remove("up", "down", "flat");
    el.classList.add(val > 0 ? "up" : val < 0 ? "down" : "flat");
  }

  // Chart.js 초기화
  let chartInstance = null;
  let allCharts = {};
  let activePeriod = "1m";

  const ctx = document.getElementById("priceChart").getContext("2d");

  function renderChart(period) {
    const points = allCharts[period] || [];
    const labels = points.map(p => p.date);
    const values = points.map(p => p.price);

    const isUp = values.length > 1 && values[values.length - 1] >= values[0];
    const lineColor = isUp ? "#ea4335" : "#34a853";
    const fillColor = isUp ? "rgba(234,67,53,0.12)" : "rgba(52,168,83,0.12)";

    if (chartInstance) chartInstance.destroy();

    chartInstance = new Chart(ctx, {
      type: "line",
      data: {
        labels,
        datasets: [{
          data: values,
          borderColor: lineColor,
          backgroundColor: fillColor,
          borderWidth: 2,
          pointRadius: 0,
          fill: true,
          tension: 0.3,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            mode: "index",
            intersect: false,
            callbacks: {
              label: ctx => Number(ctx.parsed.y).toLocaleString("ko-KR") + "원"
            }
          }
        },
        scales: {
          x: {
            grid: { color: "#2d3140" },
            ticks: {
              color: "#5f6368",
              font: { size: 10 },
              maxTicksLimit: 6,
              maxRotation: 0,
            }
          },
          y: {
            position: "right",
            grid: { color: "#2d3140" },
            ticks: {
              color: "#5f6368",
              font: { size: 10 },
              callback: v => Number(v).toLocaleString("ko-KR")
            }
          }
        },
        interaction: { mode: "nearest", axis: "x", intersect: false }
      }
    });
  }

  // 기간 탭 클릭
  document.querySelectorAll(".period-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".period-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      activePeriod = btn.dataset.period;
      renderChart(activePeriod);
    });
  });

  async function fetchPrice() {
    try {
      const res = await fetch("/api/price");
      const d = await res.json();

      if (!d.success) {
        document.getElementById("status-text").textContent = d.error || "오류 발생";
        document.getElementById("status-dot").className = "dot error";
        return;
      }

      document.getElementById("current-price").textContent = fmt(d.current_price);
      document.getElementById("prev-price").textContent = fmt(d.prev_price);
      document.getElementById("ask-price").textContent = fmt(d.ask_price);
      document.getElementById("bid-price").textContent = fmt(d.bid_price);

      const cp = document.getElementById("change-price");
      const cr = document.getElementById("change-rate");
      cp.textContent = fmtChange(d.change_price);
      cr.textContent = fmtRate(d.change_rate);
      setClass(cp, d.change_price);
      setClass(cr, d.change_rate);

      // 차트 갱신
      if (d.charts) {
        allCharts = d.charts;
        renderChart(activePeriod);
      }

      const updatedAt = d.updated_at ? new Date(d.updated_at).toLocaleTimeString("ko-KR") : "—";
      document.getElementById("status-text").textContent = updatedAt + " 기준";
      document.getElementById("status-dot").className = "dot";
    } catch (e) {
      document.getElementById("status-text").textContent = "연결 오류";
      document.getElementById("status-dot").className = "dot error";
    }
  }

  let secondsLeft = 60;
  function tick() {
    document.getElementById("countdown").textContent = secondsLeft;
    if (secondsLeft <= 0) {
      secondsLeft = 60;
      fetchPrice();
    }
    secondsLeft--;
  }

  fetchPrice();
  setInterval(tick, 1000);
</script>
</body>
</html>
